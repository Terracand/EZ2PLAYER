<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>DJ Player PRO</title>


<style>

.track {
  position: absolute;
  transform-origin: 0 200px;
  transition: transform 0.2s, opacity 0.2s;
  cursor: pointer;
  font-size: 14px;
}

.track.active {
  color: #00ffcc;
  font-size: 18px;
}

/* 글리치 느낌 */
.right video {
  width: 100%;
  filter: grayscale(1) contrast(1.3);
  opacity: 0.7;
  mix-blend-mode: screen;
}

body {
  margin: 0;
  background: #000;
  color: #fff;
  overflow: hidden;
  font-family: sans-serif;
}

/* 캔버스 비주얼라이저 */
canvas {
  position: fixed;
  bottom: 0;
  width: 100%;
  height: 150px;
}

/* 레이아웃 */
.container {
  display: flex;
  height: 100vh;
}

/* CD */
.left {
  width: 30%;
  display: flex;
  align-items: center;
  justify-content: center;
}

.cd {
  width: 320px;
  height: 320px;
  border-radius: 50%;
  background-size: cover;
  box-shadow: 0 0 50px rgba(255,255,255,0.2);
}

.spin {
  animation: spin 6s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* 중앙 원형 리스트 */
.center {
  width: 40%;
  position: relative;
}

.wheel {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%);
}

.track {
  position: absolute;
  transform-origin: 0 200px;
  cursor: pointer;
  opacity: 0.5;
}

.track.active {
  opacity: 1;
  color: #00ffcc;
}

/* 우측 영상 */
.right {
  width: 30%;
  display: flex;
  align-items: center;
  justify-content: center;
}

.right video {
  width: 100%;
  filter: grayscale(1) contrast(1.2);
  opacity: 0.6;
}

/* 하단 텍스트 */
.bottom {
  position: fixed;
  bottom: 160px;
  left: 30px;
}

.title { font-size: 28px; }
.artist { opacity: 0.5; }

</style>
</head>

<body>

<div class="container">
  <div class="left">
    <div class="cd" id="cd"></div>
  </div>

  <div class="center">
    <div class="wheel" id="wheel"></div>
  </div>

  <div class="right" id="mediaBox"></div>
</div>

<div class="bottom">
  <div class="title" id="title"></div>
  <div class="artist" id="artist"></div>
</div>

<canvas id="visualizer"></canvas>
<audio id="audio" crossorigin="anonymous"></audio>

<script>
document.body.addEventListener("click", ()=>{
  audio.play();
}, { once: true });

const tracks = [
  {
    title:"테스트곡",
    artist:"테스트",
    file:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3",
    cover:"https://picsum.photos/300",
    media:" "
  }
];
const audio = document.getElementById("audio");
const cd = document.getElementById("cd");
const wheel = document.getElementById("wheel");
const mediaBox = document.getElementById("mediaBox");

let current = 0;
let target = 0;
let currentAngle = 0;

/* 트랙 로드 */
function loadTrack(i){
  current = i;
  target = i;

  const t = tracks[i];

  audio.src = t.file;
  audio.play();

  cd.style.backgroundImage = `url(${t.cover})`;

  document.getElementById("title").innerText = t.title;
  document.getElementById("artist").innerText = t.artist;

  mediaBox.innerHTML = `
    <video src="${t.media}" autoplay loop muted></video>
  `;
}

/* 휠 렌더 */
function renderWheel(){
  wheel.innerHTML = "";

  tracks.forEach((t,i)=>{
    const div = document.createElement("div");
    div.className = "track";
    div.innerText = t.title;

    const diff = i - currentAngle;
    const angle = diff * 30;
    const radius = 200;

    const scale = i === Math.round(currentAngle) ? 1.4 : 0.8;
    const opacity = Math.abs(diff) < 3 ? 1 : 0.2;

    div.style.transform = `
      rotate(${angle}deg)
      translate(${radius}px)
      rotate(${-angle}deg)
      scale(${scale})
    `;

    div.style.opacity = opacity;

    if(i === Math.round(currentAngle)){
      div.classList.add("active");
    }

    div.onclick = ()=> {
      target = i;
      loadTrack(i);
    };

    wheel.appendChild(div);
  });
}

/* 부드러운 애니메이션 */
function animate(){
  requestAnimationFrame(animate);

  currentAngle += (target - currentAngle) * 0.1;

  renderWheel();
}
animate();

/* 스크롤 */
window.addEventListener("wheel", e=>{
  if(e.deltaY > 0){
    target = (target + 1) % tracks.length;
  } else {
    target = (target - 1 + tracks.length) % tracks.length;
  }
});

/* CD 회전 */
audio.addEventListener("play", ()=> cd.classList.add("spin"));
audio.addEventListener("pause", ()=> cd.classList.remove("spin"));

/* 비주얼라이저 (부드럽게) */
const ctx = new AudioContext();
const src = ctx.createMediaElementSource(audio);
const analyser = ctx.createAnalyser();

src.connect(analyser);
analyser.connect(ctx.destination);

const canvas = document.getElementById("visualizer");
const c = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = 150;

let smoothData = [];

function draw(){
  requestAnimationFrame(draw);

  const data = new Uint8Array(analyser.frequencyBinCount);
  analyser.getByteFrequencyData(data);

  c.clearRect(0,0,canvas.width,canvas.height);

  data.forEach((v,i)=>{
    smoothData[i] = smoothData[i] || 0;
    smoothData[i] += (v - smoothData[i]) * 0.2;

    c.fillStyle = "#00ffcc";
    c.fillRect(i*4, canvas.height, 3, -smoothData[i]);
  });
}
draw();

/* 초기 */
loadTrack(0);
</script>



</body>
</html>
