<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>EZ2PLAYER</title>

<style>
body {
  margin: 0;
  background: #111;
  color: #fff;
  font-family: sans-serif;
  display: flex;
  height: 100vh;
}

/* 좌측 CD */
.left {
  width: 30%;
  display: flex;
  align-items: center;
  justify-content: center;
}

.cd {
  width: 300px;
  height: 300px;
  border-radius: 50%;
  background-size: cover;
  background-position: center;
  animation: spin 5s linear infinite;
}

@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

/* 중앙 리스트 */
.center {
  width: 40%;
  overflow-y: auto;
  padding: 20px;
}

.track {
  padding: 10px;
  border-bottom: 1px solid #333;
  cursor: pointer;
}

.track:hover {
  background: #222;
}

.active {
  background: #444;
}

/* 우측 영상 */
.right {
  width: 30%;
  display: flex;
  align-items: center;
  justify-content: center;
}

.right video, .right img {
  width: 100%;
  height: auto;
}

/* 하단 정보 */
.bottom {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  background: rgba(0,0,0,0.8);
  padding: 10px;
  text-align: center;
}
</style>
</head>

<body>

<!-- 좌측 CD -->
<div class="left">
  <div class="cd" id="cd"></div>
</div>

<!-- 중앙 곡 목록 -->
<div class="center" id="playlist"></div>

<!-- 우측 영상/이미지 -->
<div class="right" id="mediaBox"></div>

<!-- 하단 정보 -->
<div class="bottom">
  <div id="title">제목</div>
  <div id="artist">아티스트</div>
</div>

<audio id="audio"></audio>

<script>
// 🎵 곡 목록 (여기만 수정하면 됨)
const tracks = [
  {
    title: "1950",
    artist: "1",
    file: "audio/EZ2DJ AEIC OST - 1950.mp3",
    cover: "cover/song1.jpg",
    media: "media/song1.mp4"
  },
  {
    title: "The Onyx Night Sky",
    artist: "2",
    file: "audio/EZ2DJ AEIC OST - The Onyx Night Sky.mp3",
    cover: "cover/song2.jpg",
    media: "media/song2.jpg"
  },
{
    title: "The Greatest Escape",
    artist: "2",
    file: "audio/EZ2DJ AEIC OST - The Greatest Escape.mp3",
    cover: "cover/song2.jpg",
    media: "media/song2.jpg"
  },
{
    title: "Satellite 61",
    artist: "2",
    file: "audio/EZ2DJ AEIC OST - Satellite 61.mp3",
    cover: "cover/song2.jpg",
    media: "media/song2.jpg"
  },
{
    title: "Rising In My Heart",
    artist: "2",
    file: "audio/EZ2DJ AEIC OST - Rising In My Heart.mp3",
    cover: "cover/song2.jpg",
    media: "media/song2.jpg"
  },
{
    title: "Phat Trash",
    artist: "2",
    file: "audio/EZ2DJ AEIC OST - Phat Trash.mp3",
    cover: "cover/song2.jpg",
    media: "media/song2.jpg"
  },
{
    title: "Nihilism",
    artist: "2",
    file: "audio/EZ2DJ AEIC OST - Nihilism.mp3",
    cover: "cover/song2.jpg",
    media: "media/song2.jpg"
  },
{
    title: "Liquid cube",
    artist: "2",
    file: "audio/EZ2DJ AEIC OST - Liquid cube.mp3",
    cover: "cover/song2.jpg",
    media: "media/song2.jpg"
  },
{
    title: "If i Coudn't see you again",
    artist: "2",
    file: "audio/EZ2DJ AEIC OST - If i Coudn't see you again.mp3",
    cover: "cover/song2.jpg",
    media: "media/song2.jpg"
  },
{
    title: "Extra Wave",
    artist: "2",
    file: "audio/EZ2DJ AEIC OST - Extra Wave.mp3",
    cover: "cover/song2.jpg",
    media: "media/song2.jpg"
  }
];

const audio = document.getElementById("audio");
const cd = document.getElementById("cd");
const playlist = document.getElementById("playlist");
const mediaBox = document.getElementById("mediaBox");

function loadTrack(index) {
  const track = tracks[index];

  // 음악
  audio.src = track.file;
  audio.play();

  // CD 이미지
  cd.style.backgroundImage = `url(${track.cover})`;

  // 하단 정보
  document.getElementById("title").innerText = track.title;
  document.getElementById("artist").innerText = track.artist;

  // 우측 미디어
  mediaBox.innerHTML = "";
  if (track.media.endsWith(".mp4")) {
    const video = document.createElement("video");
    video.src = track.media;
    video.autoplay = true;
    video.loop = true;
    video.muted = true;
    mediaBox.appendChild(video);
  } else {
    const img = document.createElement("img");
    img.src = track.media;
    mediaBox.appendChild(img);
  }

  // active 표시
  document.querySelectorAll(".track").forEach(el => el.classList.remove("active"));
  document.querySelectorAll(".track")[index].classList.add("active");
}

// 플레이리스트 생성
tracks.forEach((track, index) => {
  const div = document.createElement("div");
  div.className = "track";
  div.innerText = `${index+1}. ${track.title}`;
  div.onclick = () => loadTrack(index);
  playlist.appendChild(div);
});

// 첫 곡 자동 재생
loadTrack(0);
</script>

</body>
</html>
