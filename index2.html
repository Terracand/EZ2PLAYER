<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Visual DJ Player</title>

<style>
body {
  margin: 0;
  background: #000;
  color: #fff;
  font-family: Arial;
  overflow: hidden;
}

/* 배경 */
.bg {
  position: fixed;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle, #111 0%, #000 100%);
  z-index: -1;
}

/* 레이아웃 */
.container {
  display: flex;
  height: 100vh;
}

/* 좌측 CD */
.left {
  width: 35%;
  display: flex;
  align-items: center;
  justify-content: center;
}

.cd {
  width: 350px;
  height: 350px;
  border-radius: 50%;
  background: conic-gradient(
    red, orange, yellow, green, cyan, blue, violet, red
  );
  animation: spin 8s linear infinite;
  position: relative;
  box-shadow: 0 0 80px rgba(255,255,255,0.15);
}

.cd::after {
  content: "";
  width: 70px;
  height: 70px;
  background: #000;
  border-radius: 50%;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}

@keyframes spin {
  from { transform: rotate(0); }
  to { transform: rotate(360deg); }
}

/* 중앙 반원 리스트 */
.center {
  width: 30%;
  position: relative;
}

.arc {
  position: absolute;
  right: -150px;
  top: 50%;
  transform: translateY(-50%);
  width: 400px;
}

.track {
  position: absolute;
  left: 0;
  transform-origin: 200px center;
  color: #aaa;
  cursor: pointer;
  transition: 0.2s;
}

.track.active {
  color: #00ffcc;
  font-weight: bold;
}

/* 우측 영상 */
.right {
  width: 35%;
  display: flex;
  align-items: center;
  justify-content: center;
  filter: grayscale(100%) contrast(120%);
}

.right video {
  width: 90%;
  opacity: 0.7;
}

/* 하단 텍스트 */
.bottom {
  position: fixed;
  bottom: 40px;
  left: 40px;
}

.title {
  font-size: 36px;
}

.artist {
  opacity: 0.5;
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="container">

  <div class="left">
    <div class="cd" id="cd"></div>
  </div>

  <div class="center">
    <div class="arc" id="arc"></div>
  </div>

  <div class="right" id="mediaBox"></div>

</div>

<div class="bottom">
  <div class="title" id="title"></div>
  <div class="artist" id="artist"></div>
</div>

<audio id="audio"></audio>

<script>
const tracks = [
  "Amuse Signal",
  "Title Theme",
  "Anemia",
  "Smash",
  "Sand Storm",
  "Give it 2 me",
  "Lie Lie",
  "Substance",
  "Police",
  "Minus 2",
  "2nd Jewel"
];

const audio = document.getElementById("audio");
const arc = document.getElementById("arc");
const mediaBox = document.getElementById("mediaBox");

function loadTrack(i){
  document.getElementById("title").innerText = tracks[i];
  document.getElementById("artist").innerText = "Techno";

  audio.src = "audio/song1.mp3";
  audio.play();

  mediaBox.innerHTML = `
    <video src="media/song1.mp4" autoplay loop muted></video>
  `;

  document.querySelectorAll(".track").forEach(e=>e.classList.remove("active"));
  document.querySelectorAll(".track")[i].classList.add("active");
}

/* 반원 배치 */
tracks.forEach((t, i)=>{
  const angle = (i - tracks.length/2) * 10;

  const div = document.createElement("div");
  div.className = "track";
  div.innerText = `${String(i+1).padStart(2,"0")}  ${t}`;

  div.style.transform = `rotate(${angle}deg) translateX(180px) rotate(${-angle}deg)`;
  div.onclick = ()=>loadTrack(i);

  arc.appendChild(div);
});

loadTrack(7);
</script>

</body>
</html>
