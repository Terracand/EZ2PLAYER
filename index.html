<style>
.sub-title {
  font-size: 0.55em;
  opacity: 0.7;
  margin-left: 2px;
}
body {
  margin: 0;
  background: #000;
  color: #fff;
  overflow: hidden;

  font-family: "Orbitron", "Rajdhani", "Noto Sans KR", sans-serif;
  letter-spacing: 1px;
}
body {
  margin: 0;
  background: #000;
  color: #fff;
  overflow: hidden;
}

.left {
  position: absolute;
  left: 5%;
  top: 45%;
  transform: translate(-50%, -50%);
}

.cd {
  width: 800px;
  height: 800px;
  border-radius: 50%;
  background: #111;
  background-size: cover;
  border: 4px solid #666;
 box-shadow:
    0 0 60px rgba(255,255,255,0.15),
    inset 0 0 12px rgba(255,255,255,0.08);

  position: relative;
  animation-play-state: paused;
  transition: transform 0.2s ease-out;
}
}
.cd.spin {
  animation: spin 6s linear infinite;
  animation-play-state: running;
}
/* 기존 .cd::after 수정 (중앙 구멍 + 투명 플라스틱 허브) */

.cd::after {
  content: "";
  position: absolute;
  inset: 0;

  background-image: url("cover/disc.png"); /* 원하는 이미지 */
  background-size: cover;
  background-position: center;

  opacity: 0.5; /* 투명도 조절 */
  mix-blend-mode: none; /* 밝게 합성 (screen,overlay, soft-light 도 가능) */

  pointer-events: none;
}

/* 기존 .cd::before 수정 (가운데 작은 구멍 크게) */
.cd::before {
  content: "";
  position: absolute;

  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);

  /* 🔻 중앙 구멍 크기 확대 */
  width: 120px;
  height: 120px;
  border-radius: 50%;

  background: #000;
  border: 3px solid #777;

  box-shadow:
    inset 0 0 8px rgba(255,255,255,0.08),
    0 0 8px rgba(0,0,0,0.8);
}

.spin {
  animation: spin 6s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.arc {
  position: absolute;
  left: 20%;
  top: 50%;
  transform: translateY(-50%);
  width: 520px;
  height: 540px;
  overflow: visible;
}
/* 곡 목록표 */
.track {
  position: absolute;
  width: 550px;
  padding: 10px 40px;
  border-radius: 500px;
  border: 3px solid rgba(0,255,255,0.25);
  background: rgba(1,255,255,0.05);
  color: #9ff;
  box-shadow: 0 0 10px rgba(0,255,255,0.12);
  cursor: pointer;
  transition: transform 0.22s ease, opacity 0.22s ease, box-shadow 0.25s ease;
}

.track.active {
  color: #fff;
  border-color: #00ffe1;
  box-shadow: 0 0 18px #00ffe1;
  font-size: 28px;
}

.bottom {
  position: fixed;
  bottom: 40px; 
  left: 40px;

  z-index: 20; /* ⭐ 플레이바보다 위 */
}

.title {
  font-size: 32px;
}

.artist {
  opacity: 0.5;
}

.player-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 120px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 18px;
  background: linear-gradient(to top, rgba(40,40,40,0.95), rgba(0,0,0,0));
}

button {
  padding: 12px 16px;
  border: none;
  border-radius: 12px;
  background: #111;
  color: #fff;
  cursor: pointer;
}

button:hover {
  box-shadow: 0 0 12px #00ffe1;
}

.right {
  position: absolute;
  right: 0%;
  top: 0%;
  width: 50%;
}

.right video,
.right img {
  width: 100%;
  opacity: 0.55;
  filter: grayscale(1);
}
.seek { width: 340px; }
.vol { width: 140px; }
</style>
</head>
<body>

<div class="left">
  <div class="cd" id="cd"></div>
</div>

<div class="arc" id="arc"></div>

<div class="right" id="mediaBox"></div>

<div class="bottom">
  <div class="title" id="title"></div>
  <div class="artist" id="artist"></div>
</div>

<div class="player-bar">
  <button onclick="prevTrack()">⏮</button>
  <button onclick="togglePlay()" id="playBtn">▶</button>
  <button onclick="nextTrack()">⏭</button>

  <input class="seek" type="range" min="0" max="100" value="0" id="seek">
  <input class="vol" type="range" min="0" max="1" step="0.01" value="1" onchange="audio.volume=this.value">
</div>

const audio = document.getElementById("audio");
const arc = document.getElementById("arc");
const cd = document.getElementById("cd");
const mediaBox = document.getElementById("mediaBox");
const seek = document.getElementById("seek");
let current = 0;

function loadTrack(i) {
  current = i;
  const t = tracks[i];

  audio.src = t.file;
  audio.play();

  cd.style.backgroundImage = `url(${t.cover})`;
  title.innerText = t.title;
  artist.innerText = t.artist;

  if (t.media.endsWith(".mp4")) {
    mediaBox.innerHTML = `<video src="${t.media}" autoplay loop muted></video>`;
  } else {
    mediaBox.innerHTML = `<img src="${t.media}">`;
  }

  playBtn.innerText = "⏸";
  render();
}

function render() {
  arc.innerHTML = "";

  tracks.forEach((t, i) => {
    const div = document.createElement("div");
    const offset = i - current;
    const y = 260 + offset * 58;
    const x = Math.cos(offset * 0.42) * 210;

    div.className = "track" + (i === current ? " active" : "");
    
const match = t.title.match(/^(.*?)(\s*\(.*\))?$/);

const main = match?.[1] || t.title;
const sub = match?.[2] || "";

div.innerHTML = `
  ${main}
  <span class="sub-title">${sub}</span>
`;

    div.style.left = "120px";
    div.style.top = "260px";
    div.style.opacity = Math.max(0.18, 1 - Math.abs(offset) * 0.18);
    div.style.transform = `translate(${x}px, ${y - 260}px) translateY(-50%) scale(${i === current ? 1.12 : (1 - Math.abs(offset) * 0.04)})`;

    div.onclick = () => loadTrack(i);
    arc.appendChild(div);
  });
}

function togglePlay() {
  if (audio.paused) {
    audio.play();
    playBtn.innerText = "⏸";
  } else {
    audio.pause();
    playBtn.innerText = "▶";
  }
}

function prevTrack() {
  loadTrack((current - 1 + tracks.length) % tracks.length);
}

function nextTrack() {
  loadTrack((current + 1) % tracks.length);
}

/* <script> 안 기존 CD 회전 코드 전부 삭제 후 이것으로 교체 */

let angle = 0;          // 현재 회전 각도
let speed = 0;          // 현재 회전 속도
let targetSpeed = 0;    // 목표 속도
let spinning = false;

/* 매 프레임 회전 */
function animateCD() {
  if (!spinning) return;

  /* 목표속도로 천천히 접근 (가속/감속) */
  speed += (targetSpeed - speed) * 0.03;

  angle += speed;
  cd.style.transform = `rotate(${angle}deg)`;

  requestAnimationFrame(animateCD);

  /* 거의 멈췄으면 완전 정지 */
  if (targetSpeed === 0 && Math.abs(speed) < 0.01) {
    speed = 0;
    spinning = false;
  }
}

/* 재생 */
audio.onplay = () => {
  targetSpeed = 0.8;   // 회전 속도
  if (!spinning) {
    spinning = true;
    animateCD();
  }
};

/* 일시정지 = 감속 정지 */
audio.onpause = () => {
  targetSpeed = 0;
};

/* 곡 끝나면 다음곡 */
audio.onended = nextTrack;




audio.ontimeupdate = () => {
  seek.value = ((audio.currentTime / audio.duration) || 0) * 100;
};
seek.oninput = () => {
  audio.currentTime = (seek.value / 100) * audio.duration;
};

let wheelLock = false;

let wheelSum = 0;

window.addEventListener("wheel", e => {
  wheelSum += e.deltaY;

  /* 숫자 낮을수록 더 민감함 */
  const threshold = 30;

  if (wheelSum >= threshold) {
    nextTrack();
    wheelSum = 0;
  }

  if (wheelSum <= -threshold) {
    prevTrack();
    wheelSum = 0;
  }
});

loadTrack(0);

document.addEventListener("keydown", (e) => {

  switch (e.code) {

    /* ▶ / ⏸ 스페이스 */
    case "Space":
      e.preventDefault();
      togglePlay();
      break;

    /* ⏮ 이전곡 */
    case "ArrowLeft":
      prevTrack();
      break;

    /* ⏭ 다음곡 */
    case "ArrowRight":
      nextTrack();
      break;

    /* 🔊 볼륨 ↓ */
    case "ArrowDown":
      audio.volume = Math.max(0, audio.volume - 0.1);
      break;

    /* 🔊 볼륨 ↑ */
    case "ArrowUp":
      audio.volume = Math.min(1, audio.volume + 0.1);
      break;

    /* 🎵 숫자 1~9: 곡 점프 */
    default:
      if (e.code.startsWith("Digit")) {
        const num = parseInt(e.code.replace("Digit", ""), 10) - 1;
        if (tracks[num]) loadTrack(num);
      }
      break;
  }
});

</script>
