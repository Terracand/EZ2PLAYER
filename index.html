.bga-wrapper iframe {
  position: absolute;
  top: 50%;
  left: 50%;

  width: 140%;
  height: 140%;

  transform: translate(-50%, -50%);
  border: none;
}

body.mobile .cd {
  width: 260px;
  height: 260px;
}

.track {
  transition: transform 0.25s ease, opacity 0.25s ease;
}

#searchBox {
  position: fixed;   /* 🔥 핵심: 화면 기준 */
  top: 30px;
  right: 40px;

  width: 260px;
  padding: 10px 14px;

  border-radius: 999px;
  border: 1px solid rgba(0,255,255,0.25);

  background: rgba(0,255,255,0.05);
  color: #9ff;

  box-shadow: 0 0 12px rgba(0,255,255,0.12);

  outline: none;
  font-family: "Rajdhani", sans-serif;

  z-index: 999; /* 🔥 다른 UI 위로 */
  transition: 0.2s;
}

.search-wrapper {
  position: fixed;
  top: 30px;
  right: 40px;
  display: flex;
  align-items: center;
  gap: 8px;
  z-index: 999;
}

#searchBtn {
  padding: 10px 12px;
  border-radius: 50%;
  border: 1px solid rgba(0,255,255,0.25);
  background: rgba(0,255,255,0.05);
  color: #9ff;
  cursor: pointer;
  transition: 0.2s;
}

#searchBtn:hover {
  box-shadow: 0 0 10px #00ffe1;
  color: #fff;
}


#searchBox::placeholder {
  color: rgba(0,255,255,0.5);
  letter-spacing: 2px;
}
#searchBox:focus {
  border-color: #00ffe1;
  box-shadow:
    0 0 10px #00ffe1,
    0 0 22px rgba(0,255,225,0.6);
  color: #fff;
}


.sub-title {
  font-size: 0.55em;
  opacity: 0.7;
  margin-left: 2px;
}
body {
  margin: 0;
  background: #000;
  color: #fff;
  overflow: hidden;

  font-family: "Orbitron", "Rajdhani", "Noto Sans KR", sans-serif;
  letter-spacing: 1px;
}
body {
  margin: 0;
  background: #000;
  color: #fff;
  overflow: hidden;
}

.left {
  position: absolute;
  left: 5%;
  top: 45%;
  transform: translate(-50%, -50%);
}
.cd {
  width: 800px;
  height: 800px;
  border-radius: 50%;
  background: #111;
  background-size: cover;
  border: 4px solid #666;

  box-shadow:
    0 0 60px rgba(255,255,255,0.15),
    inset 0 0 12px rgba(255,255,255,0.08);

  position: relative;

  /* 🔥 진짜 구멍 */
  -webkit-mask: radial-gradient(circle 60px at center, transparent 98%, black 100%);
  mask: radial-gradient(circle 60px at center, transparent 98%, black 100%);
}
  
.cd.spin {
  animation: spin 6s linear infinite;
  animation-play-state: running;
}
/* 기존 .cd::after 수정 (중앙 구멍 + 투명 플라스틱 허브) */

.cd::after {
  content: "";
  position: absolute;
  inset: 0;

  background-image: url("cover/disc.png"); /* 원하는 이미지 */
  background-size: cover;
  background-position: center;

  opacity: 0.5; /* 투명도 조절 */
  mix-blend-mode: none; /* 밝게 합성 (screen,overlay, soft-light 도 가능) */

  pointer-events: none;
}

/* 기존 .cd::before 수정 (가운데 작은 구멍 크게) */
.cd::before {
  content: "";
  position: absolute;

  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);

  /* 🔻 중앙 구멍 크기 확대 */
  width: 120px;
  height: 120px;
  border-radius: 50%;

  border: 3px solid #777;

  box-shadow:
    inset 0 0 8px rgba(255,255,255,0.08),
    0 0 8px rgba(0,0,0,0.8);
}

.spin {
  animation: spin 6s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.arc {
  position: absolute;
  left: 20%;
  top: 50%;
  transform: translateY(-50%);
  width: 520px;
  height: 540px;
  overflow: visible;
}
/* 곡 목록표 */
.track {
  position: absolute;
  width: 550px;
  padding: 10px 40px;
  border-radius: 500px;
  border: 3px solid rgba(0,255,255,0.25);
  background: rgba(1,255,255,0.05);
  color: #9ff;
  box-shadow: 0 0 10px rgba(0,255,255,0.12);
  cursor: pointer;
  transition: transform 0.22s ease, opacity 0.22s ease, box-shadow 0.25s ease;
}

.track.active {
  color: #fff;
  border-color: #00ffe1;
  box-shadow: 0 0 18px #00ffe1;
  font-size: 28px;
}

.bottom {
  position: fixed;
  bottom: 40px; 
  left: 40px;

  z-index: 20; /* ⭐ 플레이바보다 위 */
}

.title {
  font-size: 32px;
}

.artist {
  opacity: 0.5;
}

.player-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 120px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 18px;
  background: linear-gradient(to top, rgba(40,40,40,0.95), rgba(0,0,0,0));
}

button {
  padding: 12px 16px;
  border: none;
  border-radius: 12px;
  background: #111;
  color: #fff;
  cursor: pointer;
}

button:hover {
  box-shadow: 0 0 12px #00ffe1;
}
/* 백그라운드영상 */
.right {
  position: absolute;
  right: 0%;
  top: 0%;
  width: 50%;
}
.right {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;

  z-index: -1;              /* 🔥 완전히 뒤로 */
  pointer-events: none;     /* 🔥 클릭 방해 X */
}

.right video,
.right img {
  width: 100%;
  height: 100%;
  object-fit: cover;        /* 🔥 화면 꽉 채움 */

  opacity: 0.35;            /* 🔥 흐리게 */
  filter: blur(6px);  /* 🔥 블러  */
}

.seek { width: 340px; }
.vol { width: 140px; }

/*모바일1*/

/* 📱 모바일 가로모드 = PC 느낌 UI */
@media (max-width: 768px) and (orientation: landscape) {

body {
  overflow: hidden;
  touch-action: none;
}

  /* CD 위치 복구 */
  .left {
    position: absolute;
    left: 5%;
    top: 50%;
    transform: translate(-50%, -50%);
  }

  /* CD 크기 (적당히 타협) */
  .cd {
    width: 700px;
    height: 700px;
  }
.arc {
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  touch-action: pan-y;
}
  /* 곡 리스트  */
  .arc {
    position: absolute;
    left: 20%;
    top: 50%;
    transform: translateY(-50%);
    width: 520px;
    height: 540px;
  }

  .track {
    position: absolute;
    width: 550px;
  }

  /* 배경 다시 켜기 */
  .right {
    display: block;
  }

  /* 하단 정보 PC 스타일 */
  .bottom {
    position: fixed;
    bottom: 30px;
    left: 30px;
    text-align: left;
  }

  /* 플레이어 바 정리 */
  .player-bar {
    height: 100px;
    flex-wrap: nowrap;
  }

  .seek {
    width: 300px;
  }

  .vol {
    width: 120px;
  }
}

 /*모바일 가로모드끝*/

function parseYouTube(input) {
  if (!input) return {};

  // 그냥 ID만 온 경우
  if (!input.includes("http")) {
    const [id, query] = input.split("?");
    return extract(id, query);
  }

  // 전체 URL
  let id = null;
  let query = input.split("?")[1] || "";

  const short = input.match(/youtu\.be\/([a-zA-Z0-9_-]{11})/);
  const long = input.match(/[?&]v=([a-zA-Z0-9_-]{11})/);

  if (short) id = short[1];
  if (long) id = long[1];

  return extract(id, query);
}

function extract(id, query) {
  let start = 0;

  if (query) {
    const params = new URLSearchParams(query);

    if (params.get("t")) {
      const t = params.get("t");
      start = parseInt(t.replace("s", "")) || 0;
    }
  }

  return { id, start };
}
  
const audio = document.getElementById("audio");
const arc = document.getElementById("arc");
const cd = document.getElementById("cd");
const mediaBox = document.getElementById("mediaBox");
const seek = document.getElementById("seek");
let current = 0;
  
/* 🔥 BGA CACHE */
const bgCache = {};
  
function preloadBGA(id) {
  if (!id || bgCache[id]) return;

  const iframe = document.createElement("iframe");

  iframe.src = `https://www.youtube.com/embed/${id}?controls=0&rel=0&mute=1&playsinline=1`;
  
  bgCache[id] = iframe; // 🔥 DOM에 넣지 않음
}
  
const title = document.getElementById("title");
const artist = document.getElementById("artist");
const playBtn = document.getElementById("playBtn");

const searchBox = document.getElementById("searchBox");

let searchIndex = -1; // 🔥 추가

const normalize = (str) =>
  str.toLowerCase().replace(/\s+/g, ""); // 🔥 공백 제거

searchBox.addEventListener("input", () => {
  const q = normalize(searchBox.value);

  if (!q) {
    searchIndex = -1;
    return;
  }

  const index = tracks.findIndex(t =>
    normalize(t.title).includes(q) ||
    normalize(t.artist).includes(q)
  );

  if (index !== -1) {
    searchIndex = index;
    current = index;
    render();
  }
});

function doSearch() {
  if (searchIndex !== -1) {
    loadTrack(searchIndex);
  }
}

searchBox.addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    doSearch();
  }
});

const searchBtn = document.getElementById("searchBtn");

if (searchBtn) {
  searchBtn.addEventListener("click", doSearch);
}

function loadTrack(i) {
  current = i;
  const t = tracks[i];

  /* 오디오 지연*/
/* 영상 먼저 */
loadVideo();

/* 오디오 로드 */
audio.src = t.file;

/* 현재 영상 */
if (t.video) {

  mediaBox.innerHTML = `
    <div class="bga-wrapper">
      <iframe
        src="https://www.youtube.com/embed/${id}?autoplay=1&mute=1&controls=0&rel=0&playsinline=1&start=${start}"
        frameborder="0"
        allow="autoplay; encrypted-media"
        allowfullscreen
      ></iframe>
    </div>
  `;

  /* 🔥 다음곡 미리 로딩 */
  const next = tracks[(current + 1) % tracks.length];
  const { id: nextId } = parseYouTube(next.video);
preloadBGA(nextId);
}

else if (t.media) {
  mediaBox.innerHTML = `
    <video 
      src="${t.media}"
      autoplay 
      loop 
      muted 
      playsinline
      style="width:100%; height:100%; object-fit:cover;"
    ></video>
  `;
}

else {
  mediaBox.innerHTML = "";
}
/* BGA end */
  

  playBtn.innerText = "⏸";
  render();
}

function render() {
  arc.innerHTML = "";

  tracks.forEach((t, i) => { //트랙 간격
    const div = document.createElement("div");
    const offset = i - current;

/* 🔥 여기부터 새로 넣기 */
let y = 260;

for (let j = 0; j < Math.abs(offset); j++) {
  if (j === 0) y += 85 * Math.sign(offset);  // 바로 위/아래
  else y += 65 * Math.sign(offset);           // 그 다음부터
}
/* 🔥 여기까지 */

div.style.opacity = i === current ? 1 : 0.5;

    const x = Math.cos(offset * 0.25) * 210;

    div.className = "track" + (i === current ? " active" : "");
    
const match = t.title.match(/^(.*?)(\s*\(.*\))?$/);

const main = match?.[1] || t.title;
const sub = match?.[2] || "";

div.innerHTML = `
  ${main}
  <span class="sub-title">${sub}</span>
`;

    div.style.left = "120px";
    div.style.top = "260px";
    div.style.opacity = Math.max(0.18, 1 - Math.abs(offset) * 0.18);
    div.style.transform = `translate(${x}px, ${y - 260}px) translateY(-50%)
scale(${i === current ? 1.3 : (1 - Math.abs(offset) * 0.02)})`;

    div.onclick = () => loadTrack(i);
    arc.appendChild(div);
  });
}

function togglePlay() {
  if (audio.paused) {
    audio.play();
    playBtn.innerText = "⏸";
  } else {
    audio.pause();
    playBtn.innerText = "▶";
  }
}

function prevTrack() {
  loadTrack((current - 1 + tracks.length) % tracks.length);
}

function nextTrack() {
  loadTrack((current + 1) % tracks.length);
}

/* <script> 안 기존 CD 회전 코드 전부 삭제 후 이것으로 교체 */

let angle = 0;          // 현재 회전 각도
let speed = 0;          // 현재 회전 속도
let targetSpeed = 0;    // 목표 속도
let spinning = false;

/* 매 프레임 회전 */
function animateCD() {
  if (!spinning) return;

  /* 목표속도로 천천히 접근 (가속/감속) */
  speed += (targetSpeed - speed) * 0.03;

  angle += speed;
  cd.style.transform = `rotate(${angle}deg)`;

  requestAnimationFrame(animateCD);

  /* 거의 멈췄으면 완전 정지 */
  if (targetSpeed === 0 && Math.abs(speed) < 0.01) {
    speed = 0;
    spinning = false;
  }
}

/* 재생 */
audio.onplay = () => {
  targetSpeed = 0.8;   // 회전 속도
  if (!spinning) {
    spinning = true;
    animateCD();
  }
};

/* 일시정지 = 감속 정지 */
audio.onpause = () => {
  targetSpeed = 0;
};

/* 곡 끝나면 다음곡 */
audio.onended = nextTrack;




audio.ontimeupdate = () => {
  seek.value = ((audio.currentTime / audio.duration) || 0) * 100;
};
seek.oninput = () => {
  audio.currentTime = (seek.value / 100) * audio.duration;
};

let wheelLock = false;

let wheelSum = 0;

window.addEventListener("wheel", e => {
  wheelSum += e.deltaY;

  /* 숫자 낮을수록 더 민감함 */
  const threshold = 30;

  if (wheelSum >= threshold) {
    nextTrack();
    wheelSum = 0;
  }

  if (wheelSum <= -threshold) {
    prevTrack();
    wheelSum = 0;
  }
});

loadTrack(0);
render(); // 🔥 이거 추가
document.addEventListener("keydown", (e) => {

  switch (e.code) {

    /* ▶ / ⏸ 스페이스 */
    case "Space":
      e.preventDefault();
      togglePlay();
      break;

  /* ⏮ 이전곡 */ 
    case "ArrowUp":
      prevTrack();
      break;

   /* ⏭ 다음곡 */
    case "ArrowDown":
      nextTrack();
      break;

 /* 🔊 볼륨 ↓ */
    case "ArrowLeft":
      audio.volume = Math.max(0, audio.volume - 0.1);
      break;

 /* 🔊 볼륨 ↑ */
    case "ArrowRight":
      audio.volume = Math.min(1, audio.volume + 0.1);
      break;
  }
});

/*모바일*/

let touchStartY = 0;

window.addEventListener("touchstart", e => {
  touchStartY = e.touches[0].clientY;
});

window.addEventListener("touchend", e => {
  const diff = e.changedTouches[0].clientY - touchStartY;

  if (diff > 50) prevTrack();
  if (diff < -50) nextTrack();
});

function goFullscreen(el) {
  if (el.requestFullscreen) {
    el.requestFullscreen();
  } else if (el.webkitRequestFullscreen) {
    el.webkitRequestFullscreen();
  } else if (el.msRequestFullscreen) {
    el.msRequestFullscreen();
  }
}
  
function getNextVideoId() {
  const next = tracks[(current + 1) % tracks.length];
  return getYouTubeId(next.video);
}

</script>
